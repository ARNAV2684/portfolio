name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Remove edge runtime for static export
        # Edge runtime is needed on Vercel (Windows build workaround) but
        # Linux CI can run @vercel/og via Node.js fine without it.
        run: |
          sed -i 's/export const runtime = "edge";//g' \
            app/icon.tsx app/apple-icon.tsx app/opengraph-image.tsx

      - name: Build static export
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
